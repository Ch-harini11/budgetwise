<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign In — BudgetWise</title>
    <meta name="description" content="Sign in to your BudgetWise account." />
    <link rel="stylesheet" href="css/auth.css" />
</head>

<body class="auth-page" data-page="login">
    <button class="btn btn-icon theme-toggle-auth" title="Toggle theme">🌙</button>
    <div class="auth-container">
        <div class="auth-brand">
            <div class="logo">
                <div class="logo-icon">💰</div>
                <h1>BudgetWise</h1>
            </div>
            <p>AI-Driven Expense Tracker</p>
        </div>
        <div class="auth-box">
            <h2>Welcome Back 👋</h2>
            <p class="auth-subtitle">Sign in to manage your finances</p>
            <div id="authAlert" class="alert hidden"></div>
            <form id="loginForm" novalidate>
                <div class="form-group">
                    <label class="form-label">Email Address</label>
                    <div class="input-wrapper">
                        <span class="input-icon">📧</span>
                        <input type="email" name="email" id="email" class="form-input" placeholder="you@example.com"
                            required />
                    </div>
                </div>
                <div class="form-group">
                    <div style="display:flex; justify-content:space-between; margin-bottom: 8px;">
                        <label class="form-label" style="margin-bottom: 0;">Password</label>
                        <a href="forgot-password.html"
                            style="font-size:12px;color:var(--accent);font-weight:500;">Forgot password?</a>
                    </div>
                    <div class="input-wrapper">
                        <span class="input-icon">🔒</span>
                        <input type="password" name="password" id="password" class="form-input"
                            placeholder="Your password" required />
                        <button type="button" class="eye-toggle" onclick="toggleEye('password')">👁️</button>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary btn-full btn-lg mt-2">Sign In</button>
            </form>
            <div class="auth-bottom">Don't have an account? <a href="signup.html">Sign Up</a></div>
        </div>
    </div>
    <script src="js/theme.js"></script>
    <script src="js/api.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/auth.js"></script>
</body>

</html>
