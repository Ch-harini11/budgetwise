<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Verify Email — BudgetWise</title>
    <link rel="stylesheet" href="css/auth.css" />
</head>

<body class="auth-page" data-page="verify">
    <button class="btn btn-icon theme-toggle-auth">🌙</button>
    <div class="auth-container">
        <div class="auth-brand">
            <div class="logo">
                <div class="logo-icon">💰</div>
                <h1>BudgetWise</h1>
            </div>
        </div>
        <div class="auth-box text-center">
            <div id="verifyStatus">
                <div class="verify-icon" style="margin:0 auto 20px;">⏳</div>
                <h3>Verifying your email...</h3>
                <p style="color:var(--text-muted);margin-top:8px">Please wait a moment.</p>
            </div>
            <div class="auth-bottom mt-3"><a href="login.html">← Back to Login</a></div>
        </div>
    </div>
    <script src="js/theme.js"></script>
    <script src="js/api.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/auth.js"></script>
</body>

</html>
