<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Forgot Password — BudgetWise</title>
    <link rel="stylesheet" href="css/auth.css" />
</head>

<body class="auth-page" data-page="forgot">
    <button class="btn btn-icon theme-toggle-auth">🌙</button>
    <div class="auth-container">
        <div class="auth-brand">
            <div class="logo">
                <div class="logo-icon">💰</div>
                <h1>BudgetWise</h1>
            </div>
        </div>
        <div class="auth-box">
            <h2>Forgot Password? 🔑</h2>
            <p class="auth-subtitle">Enter your email and we'll send you a reset link.</p>
            <div id="authAlert" class="alert hidden"></div>
            <form id="forgotForm">
                <div class="form-group">
                    <label class="form-label">Email Address</label>
                    <div class="input-wrapper">
                        <span class="input-icon">📧</span>
                        <input type="email" name="email" id="email" class="form-input" placeholder="you@example.com"
                            required />
                    </div>
                </div>
                <button type="submit" class="btn btn-primary btn-full btn-lg mt-2">Send Reset Link</button>
            </form>
            <div class="auth-bottom"><a href="login.html">← Back to Login</a></div>
        </div>
    </div>
    <script src="js/theme.js"></script>
    <script src="js/api.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/auth.js"></script>
</body>

</html>
