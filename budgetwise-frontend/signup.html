<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign Up — BudgetWise</title>
  <meta name="description" content="Create your BudgetWise account and start tracking your finances with AI."/>
  <link rel="stylesheet" href="css/auth.css"/>
</head>
<body class="auth-page" data-page="signup">
  <button class="btn btn-icon theme-toggle-auth" title="Toggle theme">🌙</button>
  <div class="auth-container">
    <!-- Brand -->
    <div class="auth-brand">
      <div class="logo"><div class="logo-icon">💰</div><h1>BudgetWise</h1></div>
      <p>AI-Driven Expense Tracker</p>
    </div>
    <!-- Box -->
    <div class="auth-box">
      <h2>Create Account</h2>
      <p class="auth-subtitle">Join thousands saving smarter with AI insights</p>
      <div id="authAlert" class="alert hidden"></div>
      <form id="signupForm" novalidate>
        <div class="form-group">
          <label class="form-label">Full Name</label>
          <div class="input-wrapper">
            <span class="input-icon">👤</span>
            <input type="text" name="name" id="name" class="form-input" placeholder="John Doe" required/>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Email Address</label>
          <div class="input-wrapper">
            <span class="input-icon">📧</span>
            <input type="email" name="email" id="email" class="form-input" placeholder="you@example.com" required/>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <div class="input-wrapper">
            <span class="input-icon">🔒</span>
            <input type="password" name="password" id="password" class="form-input" placeholder="Min. 8 characters" required/>
            <button type="button" class="eye-toggle" onclick="toggleEye('password')">👁️</button>
          </div>
          <div class="pw-strength mt-1">
            <div class="pw-strength-bar"><div class="pw-strength-fill" id="strengthFill"></div></div>
            <div class="pw-strength-text" id="strengthText"></div>
          </div>
        </div>
        <button type="submit" class="btn btn-primary btn-full btn-lg mt-2" id="signupBtn">
          Create Account
        </button>
      </form>
      <div class="auth-bottom">Already have an account? <a href="login.html">Sign In</a></div>
    </div>
  </div>
  <script src="js/theme.js"></script>
  <script src="js/api.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
