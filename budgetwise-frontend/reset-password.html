<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reset Password — BudgetWise</title>
    <link rel="stylesheet" href="css/auth.css" />
</head>

<body class="auth-page" data-page="reset">
    <button class="btn btn-icon theme-toggle-auth">🌙</button>
    <div class="auth-container">
        <div class="auth-brand">
            <div class="logo">
                <div class="logo-icon">💰</div>
                <h1>BudgetWise</h1>
            </div>
        </div>
        <div class="auth-box">
            <h2>Set New Password 🔐</h2>
            <p class="auth-subtitle">Create a strong, new password for your account.</p>
            <div id="authAlert" class="alert hidden"></div>
            <form id="resetForm">
                <div class="form-group">
                    <label class="form-label">6-Digit OTP</label>
                    <div class="input-wrapper">
                        <span class="input-icon">🔑</span>
                        <input type="text" name="otp" id="otp" class="form-input"
                            placeholder="Enter the OTP from your email" required maxlength="6" />
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label">New Password</label>
                    <div class="input-wrapper">
                        <span class="input-icon">🔒</span>
                        <input type="password" name="password" id="password" class="form-input"
                            placeholder="Min. 8 characters" required />
                        <button type="button" class="eye-toggle" onclick="toggleEye('password')">👁️</button>
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label">Confirm Password</label>
                    <div class="input-wrapper">
                        <span class="input-icon">🔒</span>
                        <input type="password" name="confirmPassword" id="confirmPassword" class="form-input"
                            placeholder="Re-enter password" required />
                        <button type="button" class="eye-toggle" onclick="toggleEye('confirmPassword')">👁️</button>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary btn-full btn-lg mt-2">Reset Password</button>
            </form>
            <div class="auth-bottom"><a href="login.html">← Back to Login</a></div>
        </div>
    </div>
    <script src="js/theme.js"></script>
    <script src="js/api.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/auth.js"></script>
</body>

</html>
